<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Kaplet Academy</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,200;9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0C0E0D;
    --green: #36CD81;
    --white: #FFFFFF;
    --gray: rgba(255,255,255,0.55);
    --border: rgba(255,255,255,0.08);
    --card: #141614;
    --font: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background: var(--black);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  /* Linee diagonali verdi come il sito */
  .bg-lines { position: absolute; inset: 0; pointer-events: none; }
  .bg-line {
    position: absolute;
    height: 1px;
    width: 70%;
    background: linear-gradient(90deg, transparent, rgba(54,205,129,0.3), transparent);
  }
  .bg-line:nth-child(1) { top: 20%; left: -10%; transform: rotate(-8deg); }
  .bg-line:nth-child(2) { top: 40%; left: -5%; transform: rotate(-5deg); opacity:.6; }
  .bg-line:nth-child(3) { top: 60%; left: 15%; transform: rotate(-3deg); opacity:.4; }
  .bg-line:nth-child(4) { top: 75%; left: -10%; transform: rotate(-6deg); opacity:.5; }
  .bg-line:nth-child(5) { top: 85%; left: 25%; transform: rotate(-4deg); opacity:.3; }

  .login-box {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 2rem;
  }

  .logo {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .logo-mark {
    font-size: 1rem;
    font-weight: 400;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--white);
    margin-bottom: 6px;
  }

  .logo-mark span { color: var(--green); }

  .logo-sub {
    font-size: 0.7rem;
    font-weight: 300;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gray);
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 2rem;
  }

  .card-title {
    font-size: 1.25rem;
    font-weight: 200;
    color: var(--white);
    margin-bottom: 0.25rem;
  }

  .card-sub {
    font-size: 0.78rem;
    font-weight: 300;
    color: var(--gray);
    margin-bottom: 2rem;
  }

  .form-group { margin-bottom: 1.25rem; }

  label {
    display: block;
    font-size: 0.6rem;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 6px;
  }

  input {
    width: 100%;
    height: 44px;
    background: var(--black);
    border: 1px solid var(--border);
    color: var(--white);
    font-family: var(--font);
    font-size: 0.875rem;
    font-weight: 300;
    padding: 0 14px;
    outline: none;
    transition: border-color 0.2s;
    border-radius: 0;
  }

  input:focus { border-color: var(--green); }
  input::placeholder { color: rgba(255,255,255,0.2); }

  .btn-login {
    width: 100%;
    height: 46px;
    background: var(--green);
    border: 1px solid var(--green);
    color: var(--black);
    font-family: var(--font);
    font-size: 0.82rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 0.5rem;
    border-radius: 0;
  }

  .btn-login:hover { background: transparent; color: var(--green); }
  .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

  .error-msg {
    display: none;
    margin-top: 1rem;
    padding: 0.75rem 1rem;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.25);
    color: #f87171;
    font-size: 0.78rem;
    font-weight: 300;
  }

  .footer-login {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.68rem;
    font-weight: 300;
    color: var(--gray);
  }

  .footer-login a {
    color: var(--green);
    text-decoration: none;
  }

  .spinner {
    display: none;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: var(--black);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin: 0 auto;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="bg-lines">
  <div class="bg-line"></div>
  <div class="bg-line"></div>
  <div class="bg-line"></div>
  <div class="bg-line"></div>
  <div class="bg-line"></div>
</div>

<div class="login-box">
  <div class="logo">
    <div class="logo-mark"><span>·</span>KAPLET</div>
    <div class="logo-sub">Academy</div>
  </div>

  <div class="card">
    <div class="card-title">Accedi</div>
    <div class="card-sub">Inserisci le tue credenziali per entrare nella tua area personale.</div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email aziendale</label>
        <input type="email" id="email" placeholder="nome@kaplet.it" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="btn-submit">
        <span id="btn-text">Accedi</span>
        <div class="spinner" id="spinner"></div>
      </button>
    </form>

    <div class="error-msg" id="error-msg"></div>
  </div>

  <div class="footer-login">
    <a href="index.html">← Torna al catalogo corsi</a>
  </div>
</div>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script>
  // Se già loggato, redirect
  (async () => {
    const user = await getUtenteCorrente();
    if (user) {
      const tecnico = await getTecnicoCorrente();
      if (tecnico?.is_admin) {
        window.location.href = 'admin.html';
      } else {
        window.location.href = 'tecnico.html';
      }
    }
  })();

  async function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const btn = document.getElementById('btn-submit');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btn-text');
    const errorMsg = document.getElementById('error-msg');

    // Loading state
    btn.disabled = true;
    btnText.style.display = 'none';
    spinner.style.display = 'block';
    errorMsg.style.display = 'none';

    try {
      await loginUtente(email, password);
      const tecnico = await getTecnicoCorrente();
      if (tecnico?.is_admin) {
        window.location.href = 'admin.html';
      } else {
        window.location.href = 'tecnico.html';
      }
    } catch (err) {
      errorMsg.textContent = 'Email o password non corretti. Riprova.';
      errorMsg.style.display = 'block';
      btn.disabled = false;
      btnText.style.display = 'block';
      spinner.style.display = 'none';
    }
  }
</script>
</body>
</html>
